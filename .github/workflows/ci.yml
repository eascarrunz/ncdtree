name: CI

on:
    push:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            CGO_ENABLED: "1"

        steps:
        - uses: actions/checkout@v4

        - name: Go Setup
          uses: actions/setup-go@v6
          with:
            go-version: 1.24.3

        - name: Install Brotli
          run: sudo apt-get update && sudo apt-get install -y libbrotli-dev

        - name: Test
          run: go test ./...

        - name: Build
          run: go build ./...
